<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1">
  <title>Mockup: 06 — Single Account Edge Case</title>
  <link rel="preconnect" href="https://rsms.me">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/mockup-base.css">
  <!--
    US-MOCK-006: Single account edge case.
    AC-MOCK-006-H1: subtitle "1 บัญชี" NOT "1 of 1"
    AC-MOCK-006-H2: no rank chrome — row renders identically to default rows (per OPEN-D-007)
  -->
</head>
<body>
  <div class="screen-wrapper">

    <!-- APP HEADER -->
    <header class="app-header" role="banner">
      <div class="app-header__top">
        <h1 class="app-header__title">บัญชีของฉัน</h1>
        <button
          type="button"
          class="app-header__refresh"
          aria-label="รีเฟรชข้อมูลบัญชี"
        >
          <!-- Heroicons outline: arrow-path -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" focusable="false">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        </button>
      </div>
      <!-- AC-MOCK-006-H1: "1 บัญชี" — NOT "1 of 1" / "ลำดับที่ 1 จาก 1" -->
      <p class="app-header__subtitle">อัปเดตล่าสุด · 1 บัญชี</p>
    </header>

    <!-- ACCOUNT LIST — single account, no rank chrome -->
    <main>
      <ul
        class="account-list"
        aria-label="รายการบัญชีของฉัน"
        role="list"
      >

        <!--
          Single row: Savings ****7890
          AC-MOCK-006-H2: renders identically to default rows — NO rank number badge,
          NO "1 of 1" indicator. DOM position carries rank implicitly.
        -->
        <li class="account-row" role="listitem">
          <div class="account-type-icon" aria-hidden="true">
            <!-- Heroicons outline: banknotes (Savings) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" focusable="false">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
            </svg>
          </div>
          <div class="account-row__info">
            <p class="account-row__type">บัญชีออมทรัพย์</p>
            <p class="account-row__number" aria-label="เลขบัญชีลงท้าย 7890">****7890</p>
            <p class="account-row__updated">
              <time datetime="2026-05-21T10:00">อัปเดต: 10:00</time>
            </p>
          </div>
          <div class="account-row__balance-col">
            <p class="balance-amount" aria-label="ยอดเงิน 128,540.25 บาท">฿128,540.25</p>
            <p class="balance-currency" aria-hidden="true">THB</p>
          </div>
        </li>

      </ul>
    </main>

  </div>
</body>
</html>
