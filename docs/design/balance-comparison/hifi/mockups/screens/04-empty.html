<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1">
  <title>Mockup: 04 — Empty State</title>
  <link rel="preconnect" href="https://rsms.me">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/mockup-base.css">
  <!-- US-MOCK-004: Empty state — zero active accounts, centered layout, disabled CTA -->
</head>
<body>
  <div class="screen-wrapper">

    <!-- APP HEADER -->
    <header class="app-header" role="banner">
      <div class="app-header__top">
        <h1 class="app-header__title">บัญชีของฉัน</h1>
      </div>
      <p class="app-header__subtitle">ไม่พบบัญชีที่ใช้งานอยู่</p>
    </header>

    <!-- EMPTY STATE CONTENT -->
    <main>
      <div class="empty-state" role="status">

        <!-- Illustration placeholder — 120×120px circle with primary-300 stroke -->
        <div class="empty-state__illustration" aria-hidden="true">
          <!-- Placeholder illustration: stylized "no accounts" icon using Heroicons banknotes with muted style -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" focusable="false">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
          </svg>
        </div>

        <!-- Heading — typography.heading_2 -->
        <h2 class="empty-state__heading">
          ยังไม่มีบัญชีที่ใช้งานอยู่
        </h2>

        <!-- Subtitle — typography.body, color.text.secondary, center-aligned -->
        <p class="empty-state__body">
          บัญชีที่ปิดหรือไม่เคลื่อนไหวจะไม่แสดงในหน้านี้
        </p>

        <!--
          Disabled CTA placeholder — per OPEN-D-012:
          non-interactive <span> with aria-disabled="true"
          NOT a <button> element — visually disabled, not actionable
        -->
        <span
          class="empty-state__cta-disabled"
          aria-disabled="true"
          role="button"
        >
          เปิดบัญชีใหม่
        </span>

      </div>
    </main>

  </div>
</body>
</html>
