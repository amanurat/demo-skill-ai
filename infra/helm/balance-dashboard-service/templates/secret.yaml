# =============================================================================
# Secret — balance-dashboard-service (Vault CSI placeholder)
#
# IMPORTANT: These Secret objects are NOT populated by Helm.
# They are populated by the Vault CSI provider (SecretProviderClass) at runtime.
# Helm creates the Secret shells; Vault injects the actual values when pods mount
# the CSI volume. The Deployment references these Secrets via secretKeyRef.
#
# Vault paths (configure in SecretProviderClass):
#   banking/balance-dashboard-service/redis-password
#     -> key: redis-password -> env: REDIS_PASSWORD
#   banking/balance-dashboard-service/kafka-sasl-jaas-config
#     -> key: kafka-sasl-jaas-config -> env: KAFKA_SASL_JAAS_CONFIG
#
# Secret rotation:
#   K8s envFrom / secretKeyRef does NOT hot-reload on Vault rotation.
#   After secret rotation in Vault, you MUST restart pods:
#     kubectl rollout restart deployment/balance-dashboard-service -n <namespace>
#   Reference: banking-devops gotcha "Secret rotation requires pod restart"
# =============================================================================

# Redis password secret shell — Vault CSI populates the actual value
apiVersion: v1
kind: Secret
metadata:
  name: balance-dashboard-service-vault-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "balance-dashboard-service.labels" . | nindent 4 }}
  annotations:
    vault.hashicorp.com/secret-path: "banking/balance-dashboard-service/redis-password"
    # PLACEHOLDER: Vault CSI provider populates this at pod scheduling time
type: Opaque
data:
  # Value injected by Vault CSI SecretProviderClass — DO NOT set here
  # redis-password: <Vault-injected>

---
# Kafka SASL JAAS config secret shell — Vault CSI populates the actual value
apiVersion: v1
kind: Secret
metadata:
  name: balance-dashboard-service-vault-kafka
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "balance-dashboard-service.labels" . | nindent 4 }}
  annotations:
    vault.hashicorp.com/secret-path: "banking/balance-dashboard-service/kafka-sasl-jaas-config"
    # PLACEHOLDER: Vault CSI provider populates this at pod scheduling time
type: Opaque
data:
  # Value injected by Vault CSI SecretProviderClass — DO NOT set here
  # kafka-sasl-jaas-config: <Vault-injected>
