# =============================================================================
# transfer-service — Local Development Docker Compose
# Standard: banking-devops-platform skill
#
# Services:
#   postgres        — PostgreSQL 16 (source of truth DB for transfer-service)
#   transfer-service — Spring Boot 3.x app (built from Dockerfile)
#   prometheus      — Metrics scraping from /actuator/prometheus
#   grafana         — Dashboard provisioned from infra/observability/grafana/
#
# Kafka + Zookeeper: commented out — v1 uses outbox table only; Kafka relay
#                    ships in US-007. Uncomment when ready.
#
# Usage:
#   docker compose up -d postgres
#   docker compose up -d transfer-service
#   docker compose up -d       (full stack including observability)
#   docker compose logs -f transfer-service
#   docker compose down -v     (remove containers + volumes)
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared network — all services communicate on this bridge
# ---------------------------------------------------------------------------
networks:
  banking-local:
    driver: bridge
    name: banking-local

# ---------------------------------------------------------------------------
# Named volumes — persistent data survives container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
    name: transfer-postgres-data
  prometheus-data:
    name: transfer-prometheus-data
  grafana-data:
    name: transfer-grafana-data

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 — primary datastore for transfer-service
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: transfer-postgres
    restart: unless-stopped
    networks:
      - banking-local
    ports:
      - "5433:5432"    # 5433 on host to avoid conflict with other local postgres instances
    environment:
      POSTGRES_DB: transfer_db
      POSTGRES_USER: transfer_user
      # Local dev only — Vault CSI inject replaces this in K8s
      # Security ITEM-4: no default in application.yml; set here for local dev only
      POSTGRES_PASSWORD: transfer_pass_local_dev_only
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfer_user -d transfer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # transfer-service — Spring Boot application
  # --------------------------------------------------------------------------
  transfer-service:
    build:
      context: ../backend/transfer-service
      dockerfile: Dockerfile
    image: bank/transfer-service:1.0.0-SNAPSHOT
    container_name: transfer-service
    restart: unless-stopped
    networks:
      - banking-local
    ports:
      - "8081:8080"    # 8081 on host to avoid conflict with other local services
      - "9090:9090"    # Actuator / management (separate port — Security ITEM-9)
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Spring profile — uses application.yml defaults + overrides below
      SPRING_PROFILES_ACTIVE: local

      # Database connection
      DB_URL: jdbc:postgresql://postgres:5432/transfer_db
      DB_USERNAME: transfer_user
      # Local dev only — DO NOT replicate this pattern in K8s (use Vault CSI)
      DB_PASSWORD: transfer_pass_local_dev_only
      DB_POOL_MAX: "10"

      # Management port isolation (Security ITEM-9 — actuator on 9090, not 8080)
      MANAGEMENT_SERVER_PORT: "9090"
      MANAGEMENT_SERVER_ADDRESS: "0.0.0.0"   # 0.0.0.0 for local; 127.0.0.1 in K8s

      # OTel tracing (optional — comment out if no collector running locally)
      MANAGEMENT_TRACING_ENABLED: "false"

      # Environment tag for Micrometer metrics
      ENVIRONMENT: local

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # --------------------------------------------------------------------------
  # Prometheus — scrapes /actuator/prometheus from transfer-service
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: transfer-prometheus
    restart: unless-stopped
    networks:
      - banking-local
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    depends_on:
      - transfer-service

  # --------------------------------------------------------------------------
  # Grafana — dashboard provisioned from JSON files
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: transfer-grafana
    restart: unless-stopped
    networks:
      - banking-local
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_local_dev_only
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    depends_on:
      - prometheus

