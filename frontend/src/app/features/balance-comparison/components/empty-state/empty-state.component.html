<!--
  empty-state.component.html
  Zero accounts screen.
  role="status" — informational, not urgent (accessibility-final §6).
  Disabled CTA is <span aria-disabled="true"> — NOT <button disabled> (component-specs §8).
-->
<div
  class="empty-state"
  role="status"
  data-testid="empty-state"
>
  <!-- Illustration placeholder — line-art style per screen-specs §3 -->
  <div class="empty-state__illustration" aria-hidden="true">
    <img
      src="assets/images/no-accounts-illustration.svg"
      alt="ภาพประกอบไม่มีบัญชี"
      class="empty-state__illustration-img"
      width="120"
      height="120"
      (error)="onImgError($event)"
    />
    <!-- Fallback SVG when image not found (inline placeholder) -->
    <svg
      class="empty-state__illustration-fallback"
      viewBox="0 0 120 120"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <circle cx="60" cy="60" r="50" stroke="var(--color-primary-300)" stroke-width="2" fill="none"/>
      <path d="M40 70 Q60 50 80 70" stroke="var(--color-primary-300)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="47" cy="55" r="4" fill="var(--color-primary-300)"/>
      <circle cx="73" cy="55" r="4" fill="var(--color-primary-300)"/>
    </svg>
  </div>

  <!-- Heading — receives programmatic focus -->
  <h2
    #headingRef
    class="empty-state__heading"
    tabindex="-1"
    data-testid="empty-state-heading"
  >
    ยังไม่มีบัญชีที่ใช้งานอยู่
  </h2>

  <p class="empty-state__subtitle" data-testid="empty-state-subtitle">
    บัญชีที่ปิดหรือไม่เคลื่อนไหวจะไม่แสดงในหน้านี้
  </p>

  <!-- Disabled CTA — span with aria-disabled, not button (component-specs §8) -->
  <span
    class="empty-state__cta-disabled"
    aria-disabled="true"
    data-testid="empty-state-cta-disabled"
  >
    เปิดบัญชีใหม่
  </span>
</div>
