server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: transfer-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transfer_db}
    username: ${DB_USERNAME:transfer_user}
    password: ${DB_PASSWORD:transfer_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: transfer-hikari
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 900000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: transfer-service
      env: ${ENVIRONMENT:local}

# SpringDoc / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging — structured JSON in production; human-readable in local dev
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.bank.transfer: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# Resilience4j defaults (all decorators defined here; stub client ignores these in v1)
resilience4j:
  circuitbreaker:
    instances:
      accountClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      accountClient:
        timeoutDuration: 800ms
        cancelRunningFuture: true
  bulkhead:
    instances:
      accountClient:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
