# Test profile — used by Testcontainers integration tests.
# Datasource URL/credentials are overridden at runtime via @DynamicPropertySource.
# Flyway runs migrations against the Testcontainers PostgreSQL instance.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/transfer_test
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.bank.transfer: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info
