# Staging profile — feature flag ENABLED for sprint demo
balance-dashboard:
  enabled: true

# Staging: Redis SSL MUST be enabled (Security C-4). If staging cluster lacks TLS,
# escalate to DevOps per ASSUMPTION-TL-004 and gate the staging deploy on cluster TLS
# being enabled. Do NOT disable TLS in source code.
spring:
  data:
    redis:
      ssl:
        enabled: true    # Security C-4 — TLS required in all non-local environments
      host: ${REDIS_HOST:redis-staging.bank.local}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_SERVICE_ISSUER_URI:https://identity.staging.bank.local}

logging:
  level:
    com.bank.balancedashboard: DEBUG
